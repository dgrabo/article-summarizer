<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Article Summarizer</h1>
        <p class="subtitle">Paste an article URL and get a one-sentence summary.</p>

        <form action="/summarize" method="post">
            <input type="url" name="url" placeholder="https://example.com/article" required>
            <button type="submit">Summarize</button>
        </form>

        {% if summary %}
        <div class="result">
            <h2>Summary</h2>
            <p>{{ summary }}</p>
        </div>
        {% endif %}

        {% if error %}
        <div class="error">
            <p>{{ error }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
